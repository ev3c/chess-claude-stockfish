<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajedrez con IA</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>♟</text></svg>">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div class="container">
        <header>
            <h1>♔ Ajedrez con IA ♚ <span class="version-tag">v1.8</span></h1>
            <p id="famous-game-title" class="famous-game-title"></p>
        </header>

        <div class="game-container">
            <div class="sidebar sidebar-left">
                <div class="panel">
                    <h2>Configuración</h2>

                    <div class="config-section" id="ai-settings">
                        <label>Nivel de Dificultad:</label>
                        <select id="ai-difficulty" class="select">
                            <option value="1">Nivel 1 - Muy Fácil (local, prof. 1)</option>
                            <option value="3">Nivel 3 - Fácil (local, prof. 2)</option>
                            <option value="5">Nivel 5 - Principiante (local, prof. 2)</option>
                            <option value="8">Nivel 8 - Intermedio (local, prof. 3+Q)</option>
                            <option value="12">Nivel 12 - Avanzado (Stockfish 17, prof. 10 | local prof. 3+Q)</option>
                            <option value="15">Nivel 15 - Experto (Stockfish 17, prof. 13 | local prof. 4+Q)</option>
                            <option value="18">Nivel 18 - Maestro (Stockfish 17, prof. 16 | local prof. 4+Q)</option>
                            <option value="20" selected>Nivel 20 - Gran Maestro (Stockfish 17, prof. 18 | local prof. 4+Q)</option>
                        </select>
                    </div>
                    
                    <div class="config-section">
                        <label>Tu Color:</label>
                        <select id="player-color" class="select">
                            <option value="white">Blancas</option>
                            <option value="black">Negras</option>
                        </select>
                    </div>

                    <div class="config-section">
                        <label>Tema del Tablero:</label>
                        <select id="board-theme" class="select">
                            <option value="classic">Clásico</option>
                            <option value="wood">Madera</option>
                            <option value="blue">Azul</option>
                            <option value="green">Verde</option>
                            <option value="gray">Gris</option>
                        </select>
                    </div>

                    <div class="config-section">
                        <label>Estilo de Piezas:</label>
                        <select id="piece-style" class="select">
                            <option value="classic">Clásico Unicode</option>
                            <option value="cburnett">Cburnett (Lichess)</option>
                            <option value="merida">Mérida</option>
                            <option value="pixel">Pixel Art</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="letter">Letras</option>
                        </select>
                    </div>

                    <button id="new-game" class="btn btn-success">Nueva Partida</button>
                </div>

                <div class="panel">
                    <h2>📖 Entrenar Aperturas</h2>
                    <div class="config-section">
                        <label>Selecciona una apertura:</label>
                        <select id="opening-select" class="select">
                            <option value="">— Modo libre —</option>
                            <optgroup label="1.e4 — Juego Abierto">
                                <option value="italiana">Apertura Italiana (Giuoco Piano)</option>
                                <option value="italiana-pianissimo">Giuoco Pianissimo (mov.8)</option>
                                <option value="gambito-evans-deep">Gambito Evans Aceptado (mov.6)</option>
                                <option value="española">Apertura Española (Ruy López)</option>
                                <option value="española-cerrada">Española Cerrada Tabiya (mov.9)</option>
                                <option value="española-breyer">Española Breyer (mov.10)</option>
                                <option value="española-chigorin">Española Chigorin (mov.11)</option>
                                <option value="española-marshall">Gambito Marshall (mov.10)</option>
                                <option value="española-berlinesa">Berlinesa: Muro de Berlín (mov.6)</option>
                                <option value="escocesa">Apertura Escocesa</option>
                                <option value="petrov">Defensa Petrov</option>
                                <option value="petrov-deep">Petrov Clásica (mov.6)</option>
                                <option value="vienesa">Apertura Vienesa</option>
                                <option value="gambito-rey">Gambito de Rey</option>
                                <option value="gambito-evans">Gambito Evans</option>
                                <option value="dos-caballos">Dos Caballos</option>
                            </optgroup>
                            <optgroup label="1.e4 — Semiabiertas">
                                <option value="siciliana-najdorf">Siciliana Najdorf</option>
                                <option value="najdorf-ag5">Najdorf 6.Ag5 Envenenado (mov.8)</option>
                                <option value="najdorf-ae3">Najdorf 6.Ae3 (mov.7)</option>
                                <option value="siciliana-dragon">Siciliana Dragón</option>
                                <option value="dragon-yugoslavo">Dragón Yugoslavo (mov.9)</option>
                                <option value="siciliana-sveshnikov">Siciliana Sveshnikov</option>
                                <option value="sveshnikov-deep">Sveshnikov Cdb5 (mov.8)</option>
                                <option value="siciliana-clasica">Siciliana Clásica</option>
                                <option value="siciliana-alapin">Siciliana Alapin</option>
                                <option value="siciliana-smith-morra">Gambito Smith-Morra</option>
                                <option value="francesa-winawer">Francesa Winawer</option>
                                <option value="winawer-deep">Winawer con Dg4 (mov.7)</option>
                                <option value="francesa-clasica">Francesa Clásica</option>
                                <option value="francesa-clasica-deep">Francesa Clásica McCutcheon (mov.6)</option>
                                <option value="francesa-avance">Francesa Avance</option>
                                <option value="francesa-avance-deep">Francesa Avance Db6 (mov.6)</option>
                                <option value="francesa-tarrasch">Francesa Tarrasch</option>
                                <option value="caro-kann-clasica">Caro-Kann Clásica</option>
                                <option value="caro-kann-deep">Caro-Kann Clásica h4 (mov.7)</option>
                                <option value="caro-kann-avance">Caro-Kann Avance</option>
                                <option value="caro-kann-avance-deep">Caro-Kann Avance Ae2 (mov.5)</option>
                                <option value="escandinava">Defensa Escandinava</option>
                                <option value="pirc">Defensa Pirc</option>
                            </optgroup>
                            <optgroup label="1.d4 — Gambito de Dama">
                                <option value="gda">Gambito de Dama Aceptado</option>
                                <option value="gdr-ortodoxa">GDR Ortodoxa</option>
                                <option value="gdr-ortodoxa-deep">GDR Ortodoxa Tabiya (mov.9)</option>
                                <option value="eslava">Defensa Eslava</option>
                                <option value="eslava-checa">Eslava Checa Af5 (mov.6)</option>
                                <option value="semi-eslava">Semi-Eslava</option>
                                <option value="semi-eslava-meran">Semi-Eslava Meran b5 (mov.8)</option>
                            </optgroup>
                            <optgroup label="1.d4 — Defensas Indias">
                                <option value="india-rey">India de Rey</option>
                                <option value="india-rey-clasica">India de Rey Clásica (mov.7)</option>
                                <option value="india-rey-mar-plata">India de Rey Mar del Plata (mov.9)</option>
                                <option value="india-rey-samisch">India de Rey Sämisch (mov.7)</option>
                                <option value="nimzo-india">Nimzo-India</option>
                                <option value="nimzo-rubinstein">Nimzo-India Rubinstein (mov.7)</option>
                                <option value="nimzo-clasica">Nimzo-India Clásica Dc2 (mov.5)</option>
                                <option value="india-dama">India de Dama</option>
                                <option value="benoni">Benoni Moderna</option>
                                <option value="benoni-deep">Benoni Clásica Fianchetto (mov.7)</option>
                                <option value="budapest">Gambito Budapest</option>
                                <option value="holandesa">Defensa Holandesa</option>
                            </optgroup>
                            <optgroup label="1.d4 — Sistemas">
                                <option value="londres">Sistema Londres</option>
                                <option value="londres-deep">Londres Línea Principal (mov.5)</option>
                                <option value="colle">Sistema Colle</option>
                            </optgroup>
                            <optgroup label="Otras Aperturas">
                                <option value="inglesa">Apertura Inglesa</option>
                                <option value="inglesa-4caballos">Inglesa Cuatro Caballos (mov.5)</option>
                                <option value="reti">Apertura Réti</option>
                                <option value="catalana">Apertura Catalana</option>
                                <option value="catalana-abierta">Catalana Abierta (mov.6)</option>
                                <option value="catalana-cerrada">Catalana Cerrada (mov.6)</option>
                                <option value="larsen">Apertura Larsen</option>
                            </optgroup>
                        </select>
                    </div>
                    <div id="opening-training-info" class="opening-training-info" style="display:none;">
                        <p id="opening-training-name" class="training-name"></p>
                        <p id="opening-training-moves" class="training-moves"></p>
                        <p id="opening-training-desc" class="training-desc"></p>
                    </div>
                    <button id="start-opening-training" class="btn btn-primary" style="display:none;">♟ Iniciar Entrenamiento</button>
                    <button id="start-opening-quiz" class="btn btn-warning" style="display:none;">🧠 Quiz: Adivina el Movimiento</button>
                    <div id="quiz-score" class="quiz-score" style="display:none;">
                        <span class="quiz-correct">✓ <span id="quiz-correct-count">0</span></span>
                        <span class="quiz-wrong">✗ <span id="quiz-wrong-count">0</span></span>
                    </div>
                </div>

                <div class="panel">
                    <h2>🏆 Partidas Famosas</h2>
                    <div class="config-section">
                        <label>Selecciona una partida:</label>
                        <select id="famous-game-select" class="select">
                            <option value="">— Elegir partida —</option>
                            <optgroup label="Clásicas (s. XIX)">
                                <option value="immortal">La Partida Inmortal (Anderssen vs Kieseritzky, 1851)</option>
                                <option value="opera">La Partida de la Ópera (Morphy, 1858)</option>
                                <option value="evergreen">La Siempre Verde (Anderssen vs Dufresne, 1852)</option>
                                <option value="lasker-bauer">Lasker vs Bauer (1889) — Doble sacrificio de alfil</option>
                                <option value="steinitz-mongredien">Steinitz vs Mongredien (1862)</option>
                            </optgroup>
                            <optgroup label="Época dorada (1900-1950)">
                                <option value="rubinstein-immortal">La Inmortal de Rubinstein (Rotlewi vs Rubinstein, 1907)</option>
                                <option value="lasker-capablanca">Lasker vs Capablanca, San Petersburgo 1914</option>
                                <option value="torre-lasker">Torre vs Lasker (1925) — El Molino</option>
                                <option value="bogolyubov-monticelli">Bogolyubov vs Monticelli (1930) — The Full Monti</option>
                                <option value="game-of-century">La Partida del Siglo (Byrne vs Fischer, 1956)</option>
                            </optgroup>
                            <optgroup label="Modernas (1960-2000)">
                                <option value="polugaevsky-tal">Polugaevsky vs Tal (1969)</option>
                                <option value="fischer-spassky">Fischer vs Spassky, partida 6 (1972)</option>
                                <option value="karpov-kasparov-85">Karpov vs Kasparov, partida 16 (1985) — Brisbane Bombshell</option>
                                <option value="deepblue-kasparov-96">Deep Blue vs Kasparov, partida 1 (1996)</option>
                                <option value="kasparov-deepblue">Kasparov vs Deep Blue, partida 6 (1997)</option>
                                <option value="kasparov-topalov">Kasparov vs Topalov, Wijk aan Zee (1999)</option>
                            </optgroup>
                            <optgroup label="🇪🇸 Españolas">
                                <option value="fischer-pomar-62">Fischer vs Pomar, Estocolmo 1962 — Jaque continuo</option>
                                <option value="pomar-fischer">Pomar vs Fischer, Olimpiada La Habana 1966</option>
                                <option value="vallejo-shirov">Vallejo vs Shirov, Linares 2002</option>
                                <option value="illescas-karpov">Illescas vs Karpov, Linares 1994 — The Reign in Spain</option>
                            </optgroup>
                        </select>
                    </div>
                    <button id="load-famous-game" class="btn btn-primary" disabled>Cargar Partida</button>
                </div>
            </div>

            <div class="board-container">
                <div class="board-wrapper">
                    <div class="board-with-coords">
                        <div class="eval-bar-container">
                            <div class="eval-bar">
                                <div class="eval-bar-fill" id="eval-bar-fill"></div>
                                <div class="eval-bar-label" id="eval-bar-label">0.0</div>
                            </div>
                        </div>
                        <div class="rank-labels" id="rank-labels-left"></div>
                        <div class="board-and-files">
                            <div id="chess-board" class="chess-board"></div>
                            <div class="file-labels" id="file-labels-bottom"></div>
                        </div>
                    </div>
                </div>
                       <div id="thinking-indicator" class="thinking-indicator" style="display: none;">
                           <div class="spinner"></div>
                           <p>La IA está calculando...</p>
                       </div>
                       
                       <!-- Historial de movimientos con navegación -->
                       <div class="move-navigator">
                           <button id="nav-first" class="nav-btn" title="Ir al inicio">⏮</button>
                           <button id="nav-prev" class="nav-btn" title="Movimiento anterior">◀</button>
                           <div id="move-history-display" class="move-history-display"></div>
                           <button id="nav-next" class="nav-btn" title="Siguiente movimiento">▶</button>
                           <button id="nav-last" class="nav-btn" title="Ir al final">⏭</button>
                       </div>
                       <div id="promotion-overlay" class="promotion-overlay" style="display: none;">
                           <div class="promotion-dialog">
                               <p class="promotion-title">Promocionar peón a:</p>
                               <div class="promotion-pieces" id="promotion-pieces"></div>
                           </div>
                       </div>
                       <div id="captured-below" class="captured-below">
                           <span>Blancas: <span id="captured-white"></span></span>
                           <span>Negras: <span id="captured-black"></span></span>
                       </div>
            </div>

            <div class="sidebar sidebar-right">
                <div class="panel" id="clock-panel">
                    <h2>⏱️ Reloj de Ajedrez</h2>
                    <div id="chess-clock" class="chess-clock">
                        <div class="clock-player">
                            <div class="clock-label">Blancas</div>
                            <div class="clock-time" id="white-time">3:00</div>
                        </div>
                        <div class="clock-player">
                            <div class="clock-label">Negras</div>
                            <div class="clock-time" id="black-time">3:00</div>
                        </div>
                    </div>
                    <div class="clock-controls">
                        <label for="time-control">Control de Tiempo:</label>
                        <select id="time-control" class="select">
                            <optgroup label="⚡ Bullet">
                                <option value="1+0">1 min</option>
                                <option value="1+1">1 min + 1 seg</option>
                                <option value="2+1">2 min + 1 seg</option>
                            </optgroup>
                            <optgroup label="⚔️ Blitz">
                                <option value="3+0">3 min</option>
                                <option value="3+2" selected>3 min + 2 seg</option>
                                <option value="5+0">5 min</option>
                                <option value="5+3">5 min + 3 seg</option>
                            </optgroup>
                            <optgroup label="🎯 Rápidas">
                                <option value="10+0">10 min</option>
                                <option value="10+5">10 min + 5 seg</option>
                                <option value="15+10">15 min + 10 seg</option>
                                <option value="30+0">30 min</option>
                            </optgroup>
                            <optgroup label="♔ Clásicas">
                                <option value="60+0">60 min</option>
                                <option value="90+30">90 min + 30 seg</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                       <div class="panel">
                           <h2>Acciones</h2>
                           <button id="resign-game" class="btn btn-danger">🏳️ Abandonar</button>
                           <button id="offer-draw" class="btn btn-warning">🤝 Pedir Tablas</button>
                           <button id="resume-game" class="btn btn-success" disabled>▶ Continuar Partida</button>
                           <button id="undo-move" class="btn btn-primary">⬅ Deshacer Movimiento</button>
                           <button id="hint-move" class="btn btn-primary">💡 Sugerencia de IA</button>
                           <button id="export-pgn" class="btn btn-primary">📄 Exportar PGN</button>
                           <button id="import-pgn" class="btn btn-primary">📥 Importar PGN</button>
                       </div>

                       <div class="panel">
                           <h2>📊 Estadísticas</h2>
                           <div class="stats-container">
                               <div class="stat-item stat-wins">
                                   <div class="stat-label">Ganadas</div>
                                   <div class="stat-value" id="stat-wins">0</div>
                               </div>
                               <div class="stat-item stat-draws">
                                   <div class="stat-label">Tablas</div>
                                   <div class="stat-value" id="stat-draws">0</div>
                               </div>
                               <div class="stat-item stat-losses">
                                   <div class="stat-label">Perdidas</div>
                                   <div class="stat-value" id="stat-losses">0</div>
                               </div>
                           </div>
                           <button id="reset-stats" class="btn btn-secondary">🔄 Reiniciar Estadísticas</button>
                       </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <a href="mailto:ev3c.android@gmail.com">ev3c.android@gmail.com</a>
    </footer>

    <script src="chess-logic.js?v=20"></script>
    <script src="app.js?v=20"></script>
</body>
</html>
